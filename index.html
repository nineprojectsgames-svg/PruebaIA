<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AI Chat Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; }
        .user { align-self: flex-end; background: #238636; }
        .ai { align-self: flex-start; background: #161b22; border: 1px solid #30363d; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #161b22; }
        textarea { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; background: #0d1117; color: white; }
        button { padding: 10px 20px; background: #238636; border: none; color: white; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div id="chat"></div>
<div class="input-box">
    <textarea id="txt" placeholder="Escribe aquí..."></textarea>
    <button id="btn">Enviar</button>
</div>

<script>
    // USANDO TU KEY DIRECTAMENTE
    const KEY = "AIzaSyBjfoG76EvgQ17DC6PrX7n2L4m5I5jsC6k";
    const chat = document.getElementById('chat');
    const txt = document.getElementById('txt');
    const btn = document.getElementById('btn');
    let history = [];

    async function callAI(message) {
        history.push({ role: "user", parts: [{ text: message }] });
        
        // Probamos los 3 modelos más comunes para asegurar conexión
        const models = [
            "gemini-1.5-flash",
            "gemini-1.5-pro",
            "gemini-pro"
        ];

        for (let model of models) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history })
                });

                if (response.ok) {
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    history.push({ role: "model", parts: [{ text: aiText }] });
                    return aiText;
                }
            } catch (e) { console.error("Fallo con " + model); }
        }
        return "Error: No se pudo conectar con ningún modelo. Intenta crear una API KEY NUEVA en Google AI Studio.";
    }

    function print(text, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = type === 'ai' ? marked.parse(text) : text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = async () => {
        const val = txt.value.trim();
        if (!val) return;
        btn.disabled = true;
        print(val, 'user');
        txt.value = '';
        const res = await callAI(val);
        print(res, 'ai');
        btn.disabled = false;
    };
</script>
</body>
</html>
