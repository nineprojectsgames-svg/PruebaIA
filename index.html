<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Pro - Configurable</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Panel de Configuración */
        .config-bar { background: var(--panel); padding: 10px 20px; border-bottom: 1px solid #30363d; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .config-bar input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 5px 10px; border-radius: 4px; flex: 1; min-width: 200px; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; }
        .ai { align-self: flex-start; background: #161b22; border: 1px solid #30363d; }

        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid #30363d; }
        .container { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
        textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; padding: 12px; resize: none; outline: none; height: 45px; }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
        pre { background: #000; padding: 10px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="config-bar">
    <span>🔑 API Key:</span>
    <input type="password" id="api-key-input" placeholder="Pega tu clave de Google AI Studio aquí...">
    <small style="color: #8b949e;">Se guarda solo en este navegador</small>
</div>

<div id="chat-window">
    <div class="msg ai">
        <h3>¡Bienvenido!</h3>
        <p>Para comenzar, sigue estos pasos:</p>
        <ol>
            <li>Pega tu <b>API Key</b> en el campo de arriba.</li>
            <li>Escribe un mensaje abajo y presiona Enviar.</li>
        </ol>
    </div>
</div>

<div class="input-area">
    <div class="container">
        <textarea id="user-input" placeholder="Escribe un mensaje..."></textarea>
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyField = document.getElementById('api-key-input');

    let history = [];

    // Intentar cargar la key si ya la usaste antes en este navegador
    if(localStorage.getItem('gemini_key')) {
        apiKeyField.value = localStorage.getItem('gemini_key');
    }

    async function callGemini(text) {
        const key = apiKeyField.value.trim();
        if(!key) return "⚠️ Por favor, ingresa una API Key arriba.";
        
        // Guardar para la próxima vez
        localStorage.setItem('gemini_key', key);

        history.push({ role: "user", parts: [{ text: text }] });

        // Intentamos con la URL que suele ser más estable para llaves nuevas
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: history })
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            const aiResponse = data.candidates[0].content.parts[0].text;
            history.push({ role: "model", parts: [{ text: aiResponse }] });
            return aiResponse;

        } catch (e) {
            console.error(e);
            return "❌ Error: " + e.message;
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = type === 'ai' ? marked.parse(text) : text;
        chatWindow.appendChild(div);
        chatWindow.scrollTo(0, chatWindow.scrollHeight);
    }

    async function handle() {
        const text = userInput.value.trim();
        if(!text || sendBtn.disabled) return;

        addMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        const response = await callGemini(text);
        addMessage(response, 'ai');
        sendBtn.disabled = false;
    }

    sendBtn.onclick = handle;
    userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handle(); } };
</script>

</body>
</html>
