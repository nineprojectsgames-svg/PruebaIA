<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat IA Gratuito (con Puter.js)</title>
  <style>
    /* --- ESTILOS (Mantenidos para que se vea bien) --- */
    * { box-sizing: border-box; margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
    body { background: #f4f7fb; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; margin: 0; }
    .chat-wrapper { width: 100%; max-width: 820px; height: 90vh; max-height: 800px; background: white; border-radius: 28px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 6px 12px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(2px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .chat-header { padding: 18px 24px; background: white; border-bottom: 1px solid #e9ecf0; display: flex; align-items: center; justify-content: space-between; }
    .chat-header h1 { font-size: 1.5rem; font-weight: 600; color: #1e293b; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
    .chat-header h1 span { background: #10a37f; color: white; font-size: 0.8rem; padding: 2px 10px; border-radius: 40px; font-weight: 500; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 24px 12px 24px; display: flex; flex-direction: column; gap: 18px; background: #ffffff; scroll-behavior: smooth; }
    .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.2s ease; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .avatar { width: 36px; height: 36px; border-radius: 40px; background: #eef2ff; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #1e293b; flex-shrink: 0; }
    .message.user .avatar { background: #10a37f; color: white; }
    .bubble { background: #f1f5f9; padding: 12px 18px; border-radius: 22px; border-bottom-right-radius: 6px; line-height: 1.5; color: #0f172a; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.03); word-break: break-word; }
    .message.user .bubble { background: #10a37f; color: white; border-bottom-right-radius: 22px; border-bottom-left-radius: 6px; }
    .message.bot .bubble { border-bottom-left-radius: 6px; }
    .chat-input-area { padding: 18px 24px; background: white; border-top: 1px solid #e9ecf0; display: flex; gap: 10px; align-items: flex-end; }
    .chat-input-area textarea { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 28px; padding: 12px 18px; font-size: 0.95rem; resize: none; max-height: 120px; min-height: 52px; background: #fafcff; transition: border 0.2s; line-height: 1.4; }
    .chat-input-area textarea:focus { outline: none; border-color: #10a37f; background: white; }
    .send-btn { background: #10a37f; border: none; width: 52px; height: 52px; border-radius: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.15s; color: white; font-size: 1.6rem; font-weight: 400; box-shadow: 0 6px 10px rgba(16, 163, 127, 0.2); flex-shrink: 0; }
    .send-btn:hover { background: #0e8e6e; transform: scale(0.98); }
    .send-btn:disabled { opacity: 0.5; pointer-events: none; background: #94a3b8; }
    .status-indicator { font-size: 0.75rem; color: #64748b; padding: 0 24px 6px; display: flex; justify-content: space-between; }
    .clear-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.8rem; text-decoration: underline; padding: 4px 8px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <h1>🤖 ChatIA <span>¡Gratis y sin API Key!</span></h1>
  </div>

  <!-- Mensajes del chat -->
  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      <div class="avatar">🤖</div>
      <div class="bubble">¡Hola! Soy un chat de IA gratuito impulsado por Puter.js.<br>Pregúntame lo que quieras. No necesitas ninguna clave API.</div>
    </div>
  </div>

  <div class="status-indicator">
    <span id="connectionStatus">✅ Conectado (Puter.js)</span>
    <button class="clear-btn" id="clearChatBtn">🧹 Limpiar chat</button>
  </div>

  <!-- Área de input -->
  <div class="chat-input-area">
    <textarea id="userInput" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" title="Enviar">➤</button>
  </div>
</div>

<!-- 1. Cargar la librería de Puter.js (la magia ocurre aquí) -->
<script src="https://js.puter.com/v2/"></script>

<script>
  (function(){
    "use strict";

    // --- Elementos del DOM ---
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // --- Historial simple (solo para mantener el contexto en memoria) ---
    let conversationHistory = [
      { role: 'system', content: 'Eres un asistente útil, claro y conciso. Responde en español.' }
    ];

    // --- Función para agregar mensajes al chat ---
    function addMessage(role, content) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', role === 'user' ? 'user' : 'bot');
      
      const avatar = document.createElement('div');
      avatar.classList.add('avatar');
      avatar.textContent = role === 'user' ? '👤' : '🤖';
      
      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = content;
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      chatMessages.appendChild(messageDiv);
      
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- Función para limpiar el chat ---
    function clearChat() {
      conversationHistory = [
        { role: 'system', content: 'Eres un asistente útil, claro y conciso. Responde en español.' }
      ];
      chatMessages.innerHTML = '';
      addMessage('bot', 'Chat limpio. ¿En qué puedo ayudarte?');
    }

    // --- Función principal para enviar mensajes ---
    async function sendMessage() {
      const userMessage = userInput.value.trim();
      if (!userMessage) return;

      // Deshabilitar input y botón mientras se procesa
      userInput.disabled = true;
      sendBtn.disabled = true;

      // Mostrar mensaje del usuario
      addMessage('user', userMessage);
      conversationHistory.push({ role: 'user', content: userMessage });
      
      userInput.value = '';
      userInput.style.height = 'auto';

      // Mostrar indicador "escribiendo..."
      const typingId = 'typing-' + Date.now();
      const typingDiv = document.createElement('div');
      typingDiv.id = typingId;
      typingDiv.classList.add('message', 'bot');
      typingDiv.innerHTML = `<div class="avatar">🤖</div><div class="bubble">⏳ Escribiendo...</div>`;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        // ⚡ La conexión con la IA: simple y directa con Puter.js
        //    No necesita API Key. Solo requiere la librería que ya cargamos.
        const response = await puter.ai.chat(userMessage, {
            model: 'gpt-4o-mini', // Modelo rápido y gratuito (también puedes usar 'gpt-4.1-nano' o 'claude-haiku-3.5')
            // system_prompt: "Eres un asistente útil, claro y conciso. Responde en español." // Opcional
        });

        // Eliminar indicador "escribiendo..."
        const typingElement = document.getElementById(typingId);
        if (typingElement) typingElement.remove();

        // Extraer la respuesta (la estructura puede variar, esta es la más común)
        let botReply = response;
        if (response && typeof response === 'object') {
          // Intenta extraer el texto de diferentes formatos posibles
          botReply = response.message?.content || response.text || response.toString();
        }
        
        // Mostrar respuesta del bot
        addMessage('bot', botReply);
        conversationHistory.push({ role: 'assistant', content: botReply });

      } catch (error) {
        console.error('Error al llamar a la IA:', error);
        
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.remove();
        
        addMessage('bot', '❌ Lo siento, hubo un error al conectar con la IA. Por favor, inténtalo de nuevo en unos segundos.');
      } finally {
        // Re-habilitar input y botón
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // --- Auto-ajustar altura del textarea ---
    function autoResizeTextarea() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }

    // --- EVENT LISTENERS ---
    sendBtn.addEventListener('click', sendMessage);
    
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    userInput.addEventListener('input', autoResizeTextarea);
    clearChatBtn.addEventListener('click', clearChat);
  })();
</script>
</body>
</html>
