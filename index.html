<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat · Conecta con IA existente</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #f4f7fb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
    }
    .chat-wrapper {
      width: 100%;
      max-width: 820px;
      height: 90vh;
      max-height: 800px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 6px 12px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* header */
    .chat-header {
      padding: 18px 24px;
      background: white;
      border-bottom: 1px solid #e9ecf0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-header h1 span {
      background: #10a37f;
      color: white;
      font-size: 0.8rem;
      padding: 2px 10px;
      border-radius: 40px;
      font-weight: 500;
    }
    .config-toggle {
      background: #f1f5f9;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      border: 1px solid #e2e8f0;
    }
    .config-toggle:hover {
      background: #e2e8f0;
    }

    /* panel de configuración (oculto por defecto) */
    .config-panel {
      background: #fafcff;
      padding: 18px 24px;
      border-bottom: 1px solid #e9ecf0;
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .config-panel.visible {
      display: flex;
    }
    .config-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 16px;
    }
    .config-row label {
      font-weight: 500;
      color: #334155;
      min-width: 90px;
      font-size: 0.9rem;
    }
    .config-row input, .config-row select {
      flex: 1 1 220px;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 18px;
      font-size: 0.9rem;
      background: white;
      transition: border 0.2s;
    }
    .config-row input:focus, .config-row select:focus {
      outline: none;
      border-color: #10a37f;
      box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
    }
    .config-note {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: -4px;
      padding-left: 106px;
    }
    .config-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .btn {
      background: white;
      border: 1.5px solid #e2e8f0;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #1e293b;
    }
    .btn-primary {
      background: #10a37f;
      border-color: #10a37f;
      color: white;
    }
    .btn-primary:hover {
      background: #0e8e6e;
    }
    .btn-secondary:hover {
      background: #f1f5f9;
    }

    /* área de mensajes */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: #ffffff;
      scroll-behavior: smooth;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.bot {
      align-self: flex-start;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 40px;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #1e293b;
      flex-shrink: 0;
    }
    .message.user .avatar {
      background: #10a37f;
      color: white;
    }
    .bubble {
      background: #f1f5f9;
      padding: 12px 18px;
      border-radius: 22px;
      border-bottom-right-radius: 6px;
      line-height: 1.5;
      color: #0f172a;
      font-size: 0.95rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      word-break: break-word;
    }
    .message.user .bubble {
      background: #10a37f;
      color: white;
      border-bottom-right-radius: 22px;
      border-bottom-left-radius: 6px;
    }
    .message.bot .bubble {
      border-bottom-left-radius: 6px;
    }

    /* input area */
    .chat-input-area {
      padding: 18px 24px;
      background: white;
      border-top: 1px solid #e9ecf0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 28px;
      padding: 12px 18px;
      font-size: 0.95rem;
      resize: none;
      max-height: 120px;
      min-height: 52px;
      background: #fafcff;
      transition: border 0.2s;
      line-height: 1.4;
    }
    .chat-input-area textarea:focus {
      outline: none;
      border-color: #10a37f;
      background: white;
    }
    .send-btn {
      background: #10a37f;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      color: white;
      font-size: 1.6rem;
      font-weight: 400;
      box-shadow: 0 6px 10px rgba(16, 163, 127, 0.2);
      flex-shrink: 0;
    }
    .send-btn:hover {
      background: #0e8e6e;
      transform: scale(0.98);
    }
    .send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      background: #94a3b8;
    }

    .status-indicator {
      font-size: 0.75rem;
      color: #64748b;
      padding: 0 24px 6px;
      display: flex;
      justify-content: space-between;
    }
    .error-message {
      color: #dc2626;
      font-size: 0.8rem;
      padding: 0 24px 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* util */
    .clear-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 0.8rem;
      text-decoration: underline;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <h1>🤖 ChatIA <span>conecta API</span></h1>
    <button class="config-toggle" id="toggleConfigBtn" aria-label="Configuración">
      ⚙️ Ajustes
    </button>
  </div>

  <!-- panel de configuración API -->
  <div class="config-panel" id="configPanel">
    <div class="config-row">
      <label>🔑 API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
    </div>
    <div class="config-row">
      <label>🌐 Endpoint</label>
      <input type="text" id="endpointInput" value="https://api.openai.com/v1/chat/completions" placeholder="URL del chat completions">
    </div>
    <div class="config-row">
      <label>🧠 Modelo</label>
      <select id="modelSelect">
        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
        <option value="gpt-4o-mini">GPT-4o mini</option>
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-4-turbo">GPT-4 Turbo</option>
      </select>
    </div>
    <div class="config-note">
      ⚠️ Tu clave se guarda solo en este navegador. Para evitar CORS, usa un proxy o extensión (ver README).
    </div>
    <div class="config-actions">
      <button class="btn btn-secondary" id="clearStorageBtn">🗑️ Borrar datos guardados</button>
      <button class="btn btn-primary" id="saveConfigBtn">Guardar configuración</button>
    </div>
  </div>

  <!-- mensajes -->
  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      <div class="avatar">🤖</div>
      <div class="bubble">¡Hola! Soy un cliente para hablar con una IA existente (OpenAI o compatible).<br>➡️ Configura tu API Key en "Ajustes" y empieza a chatear.</div>
    </div>
  </div>

  <div id="errorDisplay" class="error-message"></div>
  <div class="status-indicator">
    <span id="connectionStatus">⚪ Sin conectar</span>
    <button class="clear-btn" id="clearChatBtn">🧹 Limpiar chat</button>
  </div>

  <!-- input -->
  <div class="chat-input-area">
    <textarea id="userInput" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" title="Enviar">➤</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // --- elementos DOM ---
    const configPanel = document.getElementById('configPanel');
    const toggleBtn = document.getElementById('toggleConfigBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const endpointInput = document.getElementById('endpointInput');
    const modelSelect = document.getElementById('modelSelect');
    const saveConfigBtn = document.getElementById('saveConfigBtn');
    const clearStorageBtn = document.getElementById('clearStorageBtn');
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const connectionStatus = document.getElementById('connectionStatus');
    const errorDisplay = document.getElementById('errorDisplay');

    // --- estado ---
    let apiKey = localStorage.getItem('openai_api_key') || '';
    let apiEndpoint = localStorage.getItem('openai_endpoint') || 'https://api.openai.com/v1/chat/completions';
    let model = localStorage.getItem('openai_model') || 'gpt-3.5-turbo';
    
    // Historial de conversación (solo se mantiene en memoria)
    let conversationHistory = [
      { role: 'system', content: 'Eres un asistente útil, claro y conciso. Responde en español.' }
    ];

    // --- inicializar UI con valores guardados ---
    function loadConfigIntoInputs() {
      apiKeyInput.value = apiKey;
      endpointInput.value = apiEndpoint;
      modelSelect.value = model;
      updateConnectionStatus();
    }
    loadConfigIntoInputs();

    // --- actualizar indicador de conexión ---
    function updateConnectionStatus() {
      if (apiKey && apiKey.trim().length > 10) {
        connectionStatus.innerHTML = '🟢 API Key configurada · ' + (model || 'modelo');
      } else {
        connectionStatus.innerHTML = '⚪ Sin API Key · Configura en Ajustes';
      }
    }

    // --- guardar configuración ---
    function saveConfig() {
      const newKey = apiKeyInput.value.trim();
      const newEndpoint = endpointInput.value.trim();
      const newModel = modelSelect.value;

      if (!newEndpoint) {
        alert('La URL del endpoint es obligatoria.');
        return;
      }

      apiKey = newKey;
      apiEndpoint = newEndpoint;
      model = newModel;

      localStorage.setItem('openai_api_key', apiKey);
      localStorage.setItem('openai_endpoint', apiEndpoint);
      localStorage.setItem('openai_model', model);

      updateConnectionStatus();
      configPanel.classList.remove('visible');
      showTemporaryMessage('✅ Configuración guardada', 'success');
    }

    // --- borrar almacenamiento ---
    function clearAllStorage() {
      localStorage.removeItem('openai_api_key');
      localStorage.removeItem('openai_endpoint');
      localStorage.removeItem('openai_model');
      apiKey = '';
      apiEndpoint = 'https://api.openai.com/v1/chat/completions';
      model = 'gpt-3.5-turbo';
      loadConfigIntoInputs();
      updateConnectionStatus();
      showTemporaryMessage('🧽 Configuración borrada', 'info');
    }

    // --- mostrar mensaje temporal (errores, éxito) ---
    function showTemporaryMessage(text, type = 'error') {
      errorDisplay.textContent = text;
      errorDisplay.style.color = type === 'error' ? '#dc2626' : '#10a37f';
      setTimeout(() => {
        if (errorDisplay.textContent === text) {
          errorDisplay.textContent = '';
        }
      }, 4000);
    }

    // --- agregar mensaje al chat ---
    function addMessage(role, content) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', role === 'user' ? 'user' : 'bot');
      
      const avatar = document.createElement('div');
      avatar.classList.add('avatar');
      avatar.textContent = role === 'user' ? '👤' : '🤖';
      
      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = content;
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      chatMessages.appendChild(messageDiv);
      
      // scroll hacia abajo
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- añadir mensaje de sistema / error en el chat ---
    function addSystemMessage(text) {
      const msgDiv = document.createElement('div');
      msgDiv.style.textAlign = 'center';
      msgDiv.style.fontSize = '0.8rem';
      msgDiv.style.color = '#64748b';
      msgDiv.style.margin = '6px 0';
      msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- limpiar chat (mantiene sistema) ---
    function clearChat() {
      // resetear historial a solo system prompt
      conversationHistory = [
        { role: 'system', content: 'Eres un asistente útil, claro y conciso. Responde en español.' }
      ];
      chatMessages.innerHTML = '';
      // mensaje de bienvenida
      addMessage('bot', 'Chat limpio. ¿En qué puedo ayudarte?');
    }

    // --- enviar mensaje a la API ---
    async function sendMessage() {
      const userMessage = userInput.value.trim();
      if (!userMessage) return;

      if (!apiKey || apiKey.length < 10) {
        showTemporaryMessage('❌ Falta la API Key. Configúrala en Ajustes.', 'error');
        configPanel.classList.add('visible');
        return;
      }

      // deshabilitar input mientras se procesa
      userInput.disabled = true;
      sendBtn.disabled = true;
      errorDisplay.textContent = '';

      // agregar mensaje de usuario al chat y al historial
      addMessage('user', userMessage);
      conversationHistory.push({ role: 'user', content: userMessage });
      
      // limpiar input
      userInput.value = '';
      userInput.style.height = 'auto';

      // mostrar indicador "escribiendo..."
      const typingId = 'typing-' + Date.now();
      const typingDiv = document.createElement('div');
      typingDiv.id = typingId;
      typingDiv.classList.add('message', 'bot');
      typingDiv.innerHTML = `<div class="avatar">🤖</div><div class="bubble">⏳ Escribiendo...</div>`;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        // construir cuerpo de la petición (OpenAI compatible)
        const payload = {
          model: model,
          messages: conversationHistory,
          temperature: 0.7,
          max_tokens: 1000
        };

        const response = await fetch(apiEndpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(payload)
        });

        // eliminar indicador "escribiendo"
        const typingElement = document.getElementById(typingId);
        if (typingElement) typingElement.remove();

        if (!response.ok) {
          let errorDetail = `Error ${response.status}`;
          try {
            const errData = await response.json();
            errorDetail = errData.error?.message || JSON.stringify(errData);
          } catch (e) {}
          throw new Error(`API: ${errorDetail}`);
        }

        const data = await response.json();
        const botReply = data.choices?.[0]?.message?.content || '[Sin respuesta]';
        
        // agregar respuesta al chat y al historial
        addMessage('bot', botReply);
        conversationHistory.push({ role: 'assistant', content: botReply });

        // limpiar errores
        errorDisplay.textContent = '';
        updateConnectionStatus();

      } catch (error) {
        console.error(error);
        // eliminar typing si aún existe
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.remove();
        
        let errorMsg = error.message;
        if (errorMsg.includes('Failed to fetch') || errorMsg.includes('NetworkError')) {
          errorMsg = 'Error de red/CORS. Prueba con un proxy o extensión CORS.';
        }
        addSystemMessage('⚠️ ' + errorMsg);
        showTemporaryMessage(errorMsg, 'error');
        
        // quitar el último mensaje de usuario del historial? mejor dejarlo, pero no hay respuesta.
        // opcional: podríamos remover el último user, pero es más natural dejarlo.
      } finally {
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // --- auto-ajustar altura del textarea ---
    function autoResizeTextarea() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }

    // --- EVENT LISTENERS ---
    toggleBtn.addEventListener('click', () => {
      configPanel.classList.toggle('visible');
    });

    saveConfigBtn.addEventListener('click', saveConfig);
    clearStorageBtn.addEventListener('click', clearAllStorage);

    clearChatBtn.addEventListener('click', clearChat);

    sendBtn.addEventListener('click', sendMessage);
    
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    userInput.addEventListener('input', autoResizeTextarea);

    // Cerrar panel con Escape (opcional)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && configPanel.classList.contains('visible')) {
        configPanel.classList.remove('visible');
      }
    });

    // Al cargar, si no hay apiKey, mostrar panel de ajustes suavemente
    if (!apiKey) {
      setTimeout(() => {
        configPanel.classList.add('visible');
      }, 500);
    }

    // Limpiar mensajes de error antiguos al escribir nueva config
    apiKeyInput.addEventListener('focus', () => errorDisplay.textContent = '');
    endpointInput.addEventListener('focus', () => errorDisplay.textContent = '');

    // Cargar conversación inicial (solo mensaje bot)
    // (ya está en HTML)
  })();
</script>
<!-- Nota sobre CORS: OpenAI bloquea peticiones desde navegador.
     Soluciones: usar un proxy (p.ej. https://corsproxy.io/?) o extensión "CORS Unblock".
     Para pruebas locales con Ollama/LM Studio, cambia el endpoint a http://localhost:11434/v1/chat/completions -->
</body>
</html>
