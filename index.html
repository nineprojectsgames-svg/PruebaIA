<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-X | Aprendizaje Autónomo</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: #0f172a;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --user-bubble: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header con Info de Memoria */
        header {
            padding: 15px 25px;
            background: var(--panel);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status { font-size: 0.8rem; color: var(--accent); letter-spacing: 1px; }

        /* Pantalla de Chat */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .node {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-node {
            align-self: flex-end;
            background: var(--accent);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }

        .ai-node {
            align-self: flex-start;
            background: var(--user-bubble);
            border: 1px solid #334155;
            border-bottom-left-radius: 2px;
        }

        /* Input con Estilo Tecnológico */
        .input-zone {
            padding: 25px;
            background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
        }

        .terminal-input {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            background: var(--panel);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            resize: none;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            padding: 10px;
            transition: 0.2s;
        }

        #send-btn:hover { transform: scale(1.1); color: white; }

        .info-pill { font-size: 0.7rem; background: #1e293b; padding: 2px 8px; border-radius: 10px; color: #94a3b8; }
    </style>
</head>
<body>

<header>
    <div><strong>NEURAL-X</strong> <span class="info-pill">V1.0 LOCAL-CORE</span></div>
    <div class="status" id="memory-stats">MEMORIA: 0 CONCEPTOS</div>
</header>

<div id="chat-flow">
    <div class="node ai-node">Protocolos iniciados. Soy una red neuronal local. No tengo datos pre-cargados: aprenderé de todo lo que me digas. ¿Cómo deberíamos empezar?</div>
</div>

<div class="input-zone">
    <div class="terminal-input">
        <textarea id="user-in" rows="1" placeholder="Enseña algo a la IA..."></textarea>
        <button id="send-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    // --- MOTOR LÓGICO DE LA IA ---
    class NeuralNetwork {
        constructor() {
            // Intentar cargar memoria del navegador
            this.memory = JSON.parse(localStorage.getItem('ai_memory')) || {
                saludos: ["Hola", "Saludos", "Sistemas listos"],
                desconocido: ["Interesante información.", "He registrado eso.", "¿Puedes decirme más?"],
                conceptos: {}
            };
            this.updateStats();
        }

        save() {
            localStorage.setItem('ai_memory', JSON.stringify(this.memory));
            this.updateStats();
        }

        updateStats() {
            const count = Object.keys(this.memory.conceptos).length;
            document.getElementById('memory-stats').innerText = `MEMORIA: ${count} CONCEPTOS`;
        }

        process(input) {
            const text = input.toLowerCase().trim();
            const words = text.split(/\s+/);
            
            // 1. Aprender: Guardar relación entre palabras
            words.forEach((word, index) => {
                if (word.length > 3) {
                    if (!this.memory.conceptos[word]) this.memory.conceptos[word] = [];
                    // Guarda la palabra siguiente para crear contexto
                    if (words[index + 1]) this.memory.conceptos[word].push(words[index + 1]);
                }
            });

            // 2. Generar respuesta
            let response = "";

            // Buscar si conocemos alguna palabra del input
            const knownWords = words.filter(w => this.memory.conceptos[w]);

            if (knownWords.length > 0) {
                const seed = knownWords[Math.floor(Math.random() * knownWords.length)];
                const associations = this.memory.conceptos[seed];
                const next = associations[Math.floor(Math.random() * associations.length)];
                
                response = `Al hablar de "${seed}", mi base de datos sugiere "${next}". ¿Qué conexión hay entre ellas?`;
            } else {
                // Si no sabe nada, responde con curiosidad
                response = this.memory.desconocido[Math.floor(Math.random() * this.memory.desconocido.length)];
            }

            this.save();
            return response;
        }
    }

    const brain = new NeuralNetwork();
    const chatFlow = document.getElementById('chat-flow');
    const userIn = document.getElementById('user-in');
    const sendBtn = document.getElementById('send-btn');

    function addNode(text, isUser) {
        const div = document.createElement('div');
        div.className = `node ${isUser ? 'user-node' : 'ai-node'}`;
        div.innerText = text;
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    async function handle() {
        const input = userIn.value.trim();
        if (!input) return;

        addNode(input, true);
        userIn.value = "";

        // Simular tiempo de "pensamiento"
        setTimeout(() => {
            const reply = brain.process(input);
            addNode(reply, false);
        }, 600);
    }

    sendBtn.onclick = handle;
    userIn.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handle(); } };

</script>
</body>
</html>
