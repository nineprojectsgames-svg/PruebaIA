<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AI Chat - Multi-Model System</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #161b22; padding: 15px; border-bottom: 1px solid #30363d; display: flex; flex-direction: column; gap: 10px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 85%; line-height: 1.4; }
        .user { align-self: flex-end; background: #238636; }
        .ai { align-self: flex-start; background: #1c2128; border: 1px solid #30363d; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #161b22; }
        textarea { flex: 1; background: #0d1117; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 4px; resize: none; height: 40px; }
        button { background: #238636; color: white; border: none; padding: 0 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <strong>Configuración:</strong>
    <input type="password" id="key" placeholder="Pega aquí tu API Key de Google AI Studio...">
</div>

<div id="chat">
    <div class="msg ai">1. Pega la Key arriba.<br>2. Escribe abajo.<br>Si da error, intentará otros modelos automáticamente.</div>
</div>

<div class="input-box">
    <textarea id="in" placeholder="Escribe un mensaje..."></textarea>
    <button id="go">Enviar</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('in');
    const btn = document.getElementById('go');
    const keyInput = document.getElementById('key');
    let history = [];

    // Cargar key guardada
    if(localStorage.getItem('my_key')) keyInput.value = localStorage.getItem('my_key');

    async function callAI(text) {
        const apiKey = keyInput.value.trim();
        if(!apiKey) return "❌ No hay API Key.";
        localStorage.setItem('my_key', apiKey);

        history.push({ role: "user", parts: [{ text: text }] });

        // LISTA DE MODELOS A PROBAR (Uno de estos TIENE que funcionar)
        const modelVariants = [
            "gemini-1.5-flash",
            "gemini-pro",
            "gemini-1.0-pro",
            "gemini-1.5-flash-latest"
        ];

        for (let model of modelVariants) {
            console.log("Probando modelo: " + model);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history })
                });

                if (response.ok) {
                    const data = await response.json();
                    const resText = data.candidates[0].content.parts[0].text;
                    history.push({ role: "model", parts: [{ text: resText }] });
                    return resText;
                }
            } catch (e) {}
        }

        return "❌ Error: Ningún modelo funcionó. Esto significa que tu API KEY es inválida o está bloqueada por Google.";
    }

    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = type === 'ai' ? marked.parse(text) : text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = async () => {
        const val = input.value.trim();
        if(!val || btn.disabled) return;
        btn.disabled = true;
        addMsg(val, 'user');
        input.value = '';
        const res = await callAI(val);
        addMsg(res, 'ai');
        btn.disabled = false;
    };
</script>
</body>
</html>
