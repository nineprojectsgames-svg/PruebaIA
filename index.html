<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Pro - Final Version</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: var(--card); padding: 15px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; }
        .ai { align-self: flex-start; background: #161b22; border: 1px solid #30363d; color: #e6edf3; }
        
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid #30363d; }
        .container { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
        
        textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; padding: 12px; resize: none; outline: none; height: 45px; }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:disabled { opacity: 0.5; }
        
        pre { background: #000; padding: 10px; border-radius: 6px; overflow-x: auto; }
        code { color: #79c0ff; }
    </style>
</head>
<body>

<header>
    <strong>Gemini AI Interface</strong>
    <span id="status" style="font-size: 12px; color: #8b949e;">Listo</span>
</header>

<div id="chat-box">
    <div class="message ai">¡Hola! He reiniciado el sistema. Pega tu API Key en el código y dime algo para probar la conexión.</div>
</div>

<div class="input-area">
    <div class="container">
        <textarea id="input" placeholder="Escribe un mensaje..."></textarea>
        <button id="send">Enviar</button>
    </div>
</div>

<script>
    // Configuración - PEGA TU KEY AQUÍ
    const API_KEY = "AIzaSyBjfoG76EvgQ17DC6PrX7n2L4m5I5jsC6k"; 
    
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('input');
    const btn = document.getElementById('send');
    const status = document.getElementById('status');

    let history = [];

    async function tryFetch(url, body) {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return res;
    }

    async function getAIResponse(userText) {
        status.innerText = "Pensando...";
        btn.disabled = true;

        // Añadimos al historial
        history.push({ role: "user", parts: [{ text: userText }] });

        const payload = { contents: history };
        
        // LISTA DE INTENTOS (Diferentes versiones y nombres de modelo)
        const endpoints = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`
        ];

        let finalData = null;

        for (let url of endpoints) {
            try {
                const response = await tryFetch(url, payload);
                if (response.ok) {
                    finalData = await response.json();
                    break; // Si funciona, salimos del bucle
                }
            } catch (e) {
                console.log("Fallo en: " + url);
            }
        }

        if (finalData && finalData.candidates) {
            const aiText = finalData.candidates[0].content.parts[0].text;
            history.push({ role: "model", parts: [{ text: aiText }] });
            status.innerText = "En línea";
            btn.disabled = false;
            return aiText;
        } else {
            status.innerText = "Error de conexión";
            btn.disabled = false;
            return "Lo siento, la API sigue rechazando la conexión. Revisa si tu API Key es válida para Gemini 1.5 Flash en AI Studio.";
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = type === 'ai' ? marked.parse(text) : text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handle() {
        const text = input.value.trim();
        if(!text) return;
        
        addMessage(text, 'user');
        input.value = '';
        
        const response = await getAIResponse(text);
        addMessage(response, 'ai');
    }

    btn.addEventListener('click', handle);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handle(); } });
</script>

</body>
</html>
