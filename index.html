<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interface v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --chat-bg: #151921;
            --accent: #4f46e5;
            --text: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Configuración superior */
        header {
            padding: 1rem;
            background: var(--chat-bg);
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input#api-key {
            background: #1a202c;
            border: 1px solid #4a5568;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            width: 200px;
        }

        /* Área de mensajes */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .msg {
            max-width: 85%;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.6;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--accent);
            color: white;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--chat-bg);
            border: 1px solid #2d3748;
        }

        /* Input inferior */
        .input-area {
            padding: 2rem;
            background: linear-gradient(transparent, var(--bg-color));
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 10px;
        }

        textarea {
            width: 100%;
            background: #1a202c;
            border: 1px solid #4a5568;
            color: white;
            padding: 15px;
            border-radius: 12px;
            resize: none;
            outline: none;
            height: 50px;
        }

        button#send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>

<header>
    <strong>AI Laboratory</strong>
    <input type="password" id="api-key" placeholder="Pega tu API Key de Gemini aquí">
</header>

<div id="chat-window">
    <div class="msg ai-msg">Hola. Configura tu API Key arriba para empezar a hablar con una IA real.</div>
</div>

<div class="input-area">
    <div class="input-container">
        <textarea id="user-input" placeholder="Pregunta lo que quieras..."></textarea>
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyInput = document.getElementById('api-key');

    async function callAI(prompt) {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) return "Error: Por favor, introduce una API Key.";

        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (error) {
            return "Error de conexión: Verifica tu llave o tu internet.";
        }
    }

    function addMessage(content, isUser) {
        const div = document.createElement('div');
        div.classList.add('msg', isUser ? 'user-msg' : 'ai-msg');
        
        // Usamos marked para que el código y las negritas se vean bien
        div.innerHTML = isUser ? content : marked.parse(content);
        
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    sendBtn.addEventListener('click', async () => {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        addMessage(prompt, true);
        userInput.value = "";
        sendBtn.disabled = true;

        const aiResponse = await callAI(prompt);
        addMessage(aiResponse, false);
        
        sendBtn.disabled = false;
    });

    // Enviar con Enter
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
</script>

</body>
</html>
